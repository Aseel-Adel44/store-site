<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<style>

body{
    
    background:#1f293a;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:100vh;
    font-family:Arial;
    padding-top:80px;
}


form{
    width:350px;
}

.input-box {
    position: relative;
    margin: 25px 0;
}

.input-box input {
    width: 100%;
    height: 50px;
    background: transparent;
    border:2px solid #2c4766;
    outline: none;
    border-radius:40px;
    font-size: 1em;
    color: #fff;
    padding: 0 20px;
    transition: .5s ease;
}

.input-box input:focus {
    border-color: #0ef;
}

.input-box label {
    position: absolute;
    top: 50%;
    left:20px;
    transform: translateY(-50%);
    font-size: 1em;
    color: #fff;
    pointer-events: none;
    transition: .5s ease;
}

.input-box input:focus ~ label,
.input-box input:valid ~ label {
    top:-8px;
    font-size: .8em;
    background: #1f293a;
    padding: 0 6px;
    color: #0ef;
}

button{
    width:100%;
    height:45px;
    border:none;
    border-radius:40px;
    background:#0ef;
    font-size:16px;
    cursor:pointer;
}

a{
    color:#0ef;
}

p{
    color:white;
    text-align:center;
    margin-top:20px;
}

</style>
</head>

<body>

<form method="POST">

  <div class="input-box">
      <input type="email" name="email" required>
      <label>Email</label>
  </div>

  <button type="submit">Send Reset Link</button>

</form>
<div style="margin-top:150px;">
{% if reset_link %}
<p>
Use this link to reset your password:
<br>
<a href="{{ reset_link }}">{{ reset_link }}</a>
</p>
{% endif %}
</div>
</div>
</body>
</html>
